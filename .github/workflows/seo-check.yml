name: Daily SEO Rank Check

on:
  schedule:
    - cron: '0 11 * * *'  # 7am Miami time
  workflow_dispatch:

jobs:
  seo-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run SEO Check
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: python seo_check.py

      - name: Commit results
        run: |
          git config --global user.email "seo-bot@github.com"
          git config --global user.name "SEO Bot"
          git add reports/
          git commit -m "SEO report $(date +%Y-%m-%d)" || echo "No changes"
          git push